<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的資產管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <style>
        body {
            background: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="max-w-4xl w-full px-6">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-white mb-4 tracking-tight">資產管理控制台</h1>
            <p class="text-slate-400 font-medium">請選擇您要查看的項目</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 股票管理 -->
            <a href="stocks/" class="card glass rounded-3xl p-8 flex flex-col items-center text-center group">
                <div
                    class="w-20 h-20 bg-emerald-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-emerald-500/30 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-chart-line text-3xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">股票記帳本</h2>
                <p class="text-slate-300 text-sm">管理家庭股票持股、損益試算與自動報價</p>
                <div
                    class="mt-8 px-6 py-2 bg-white/10 rounded-full text-white text-xs font-black uppercase tracking-widest group-hover:bg-emerald-500 transition-colors">
                    進入系統
                </div>
            </a>

            <!-- 資產總覽 -->
            <a href="assets/" class="card glass rounded-3xl p-8 flex flex-col items-center text-center group">
                <div
                    class="w-20 h-20 bg-indigo-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-indigo-500/30 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-vault text-3xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">資產負債表</h2>
                <p class="text-slate-300 text-sm">各銀行現金餘額紀錄、負債管理與淨值追蹤</p>
                <div
                    class="mt-8 px-6 py-2 bg-white/10 rounded-full text-white text-xs font-black uppercase tracking-widest group-hover:bg-indigo-500 transition-colors">
                    進入系統
                </div>
            </a>
        </div>

        <div class="mt-16 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-white/5 rounded-2xl border border-white/10">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">雲端同步已就緒 (Gist Sync
                    Active)</span>
            </div>
        </div>
    </div>
</body>

</html>
