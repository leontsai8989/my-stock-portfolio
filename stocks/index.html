<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭股票記帳本</title>
    <!-- 引入 Tailwind CSS 進行自動排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PWA Manifest 與 Service Worker -->
    <link rel="manifest" href="../manifest.json">
    <script>
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            navigator.serviceWorker.register('../sw.js').catch(function(err) {
                console.warn('Service Worker 註冊跳過或失敗:', err);
            });
        }
    </script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        /* 自訂顏色：台股紅漲綠跌 */
        .text-up {
            color: #ef4444;
        }

        /* Tailwind red-500 */
        .text-down {
            color: #16a34a;
        }

        /* Tailwind green-600 */
        .bg-up-light {
            background-color: #fef2f2;
        }

        /* Tailwind red-50 */
        .bg-down-light {
            background-color: #f0fdf4;
        }

        /* Tailwind green-50 */
        .border-up-light {
            border-color: #fee2e2;
        }

        .border-down-light {
            border-color: #dcfce7;
        }

        /* 隱藏數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans pb-20">

    <div class="max-w-6xl mx-auto p-3 sm:p-4 md:p-8 space-y-4 sm:space-y-6">

        <!-- Header 區塊 -->
        <header
            class="flex flex-col lg:flex-row justify-between items-start lg:items-center bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
            <div class="flex items-center justify-between w-full lg:w-auto">
                <div class="flex items-center space-x-3">
                    <div class="p-2 sm:p-3 bg-red-500 rounded-xl flex-shrink-0">
                        <i class="fa-solid fa-chart-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-slate-900 leading-tight" id="ui-title">家庭股票記帳本
                        </h1>
                        <p class="text-xs sm:text-sm text-slate-500" id="ui-subtitle">已自動扣除稅金與手續費 (台股紅漲綠跌)</p>
                    </div>
                </div>
                <!-- 手機版語言切換 -->
                <button onclick="toggleLang()"
                    class="lg:hidden flex items-center space-x-1 px-2.5 py-1.5 bg-indigo-50 text-indigo-700 rounded-lg font-bold text-sm">
                    <i class="fa-solid fa-globe"></i>
                    <span id="ui-lang-btn-mobile">Tiếng Việt</span>
                </button>
            </div>

            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full lg:w-auto">
                <div
                    class="flex flex-col sm:flex-row items-start sm:items-center space-y-2 sm:space-y-0 sm:space-x-3 bg-red-50 py-2 sm:py-2.5 px-3 sm:px-4 rounded-xl border border-red-100 w-full sm:w-auto">
                    <label class="text-sm font-bold text-red-800 whitespace-nowrap" id="ui-price-label">目前市價：</label>
                    <div class="flex items-center space-x-2 w-full sm:w-auto justify-between sm:justify-start">
                        <div class="flex items-center flex-1 sm:flex-none">
                            <input type="number" id="input-current-price" step="0.01" value="25.98"
                                class="w-full sm:w-24 bg-white border border-red-200 rounded-lg px-2 py-1.5 text-lg sm:text-xl text-right font-bold text-red-600 focus:outline-none focus:ring-2 focus:ring-red-400">
                            <span class="text-sm font-bold text-red-800 ml-2" id="ui-unit">$</span>
                        </div>
                        <button onclick="fetchStockPrice()" id="btn-refresh"
                            class="p-2 rounded-lg bg-red-100 text-red-700 hover:bg-red-200 transition-colors flex-shrink-0"
                            title="更新報價">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                </div>
                <!-- 電腦版語言切換 -->
                <button onclick="toggleLang()"
                    class="hidden lg:flex items-center space-x-2 px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 transition-colors text-indigo-700 rounded-xl font-bold whitespace-nowrap">
                    <i class="fa-solid fa-globe"></i>
                    <span id="ui-lang-btn-desktop">Tiếng Việt</span>
                </button>
            </div>
        </header>

        <!-- 總結算 KPI 卡片 -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
            <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs sm:text-sm font-medium text-slate-500 mb-1" id="ui-total-val-label">目前總價值</p>
                <h2 class="text-2xl sm:text-3xl font-bold text-slate-800" id="val-total-value">$0</h2>
            </div>
            <div id="card-total-pnl" class="p-4 sm:p-6 rounded-2xl shadow-sm border">
                <p class="text-xs sm:text-sm font-medium text-slate-600 mb-1" id="ui-total-pnl-label">總賺賠 (淨損益)</p>
                <h2 class="text-2xl sm:text-3xl font-bold flex items-center" id="val-total-pnl">
                    <span>$0</span> <i class="fa-solid ml-2" id="icon-total-pnl"></i>
                </h2>
            </div>
            <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs sm:text-sm font-medium text-slate-500 mb-1" id="ui-total-roi-label">總報酬率</p>
                <h2 class="text-2xl sm:text-3xl font-bold" id="val-total-roi">0%</h2>
            </div>
        </div>

        <!-- 主內容區塊 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">

            <!-- 左側：列表與紀錄 -->
            <div class="lg:col-span-2 space-y-4 sm:space-y-6">
                <!-- 個人損益表 -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="px-4 sm:px-6 py-3 sm:py-4 border-b border-slate-100 bg-slate-50">
                        <h3 class="font-bold text-slate-800 flex items-center text-base sm:text-lg">
                            <i class="fa-solid fa-users text-red-500 mr-2"></i>
                            <span id="ui-who-earns">每個人目前賺多少？</span>
                        </h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm sm:text-base text-left whitespace-nowrap min-w-[500px]">
                            <thead class="text-xs sm:text-sm text-slate-500 bg-white border-b border-slate-100">
                                <tr>
                                    <th class="px-4 sm:px-6 py-3" id="ui-th-name">名字</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-th-shares">持有幾張</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-th-avg">成本均價</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-th-cost">投入成本</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-th-val">目前價值</th>
                                    <th class="px-4 sm:px-6 py-3 text-right text-slate-400 font-normal" id="ui-th-fee">
                                        被扣稅費</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-th-pnl">實際賺賠</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-th-roi">報酬率</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-holdings">
                                <!-- JS 動態產生 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 交易紀錄 -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="px-4 sm:px-6 py-3 sm:py-4 border-b border-slate-100 bg-slate-50">
                        <h3 class="font-bold text-slate-800 text-base sm:text-lg" id="ui-history">歷史買賣紀錄</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left whitespace-nowrap min-w-[500px]">
                            <thead class="text-xs sm:text-sm text-slate-500 bg-white border-b border-slate-100">
                                <tr>
                                    <th class="px-4 sm:px-6 py-3" id="ui-tx-date">日期</th>
                                    <th class="px-4 sm:px-6 py-3 text-center" id="ui-tx-action">動作</th>
                                    <th class="px-4 sm:px-6 py-3" id="ui-tx-name">名字</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-tx-shares">張數</th>
                                    <th class="px-4 sm:px-6 py-3 text-right" id="ui-tx-price">成交價</th>
                                    <th class="px-4 sm:px-6 py-3 text-center" id="ui-tx-del">刪除</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-transactions">
                                <!-- JS 動態產生 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 右側：試算與新增功能 -->
            <div class="lg:col-span-1">
                <div class="lg:sticky lg:top-6 space-y-4 sm:space-y-6">

                    <!-- 賣出試算表 -->
                    <div class="bg-indigo-50 rounded-2xl shadow-sm border border-indigo-100 p-4 sm:p-6">
                        <h3 class="font-bold text-indigo-900 mb-4 flex items-center text-base sm:text-lg">
                            <i class="fa-solid fa-calculator text-indigo-600 mr-2"></i>
                            <span id="ui-sim-title">💡 賣出試算表</span>
                        </h3>

                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs sm:text-sm font-bold text-indigo-800 mb-1"
                                        id="ui-sim-who">是誰要賣？</label>
                                    <select id="sim-person"
                                        class="w-full bg-white border border-indigo-200 rounded-lg px-3 py-2 sm:py-2.5 text-base focus:ring-2 focus:ring-indigo-400 outline-none font-medium">
                                        <!-- JS 動態產生 -->
                                    </select>
                                </div>
                                <div>
                                    <label
                                        class="block text-xs sm:text-sm font-bold text-indigo-800 mb-1 whitespace-nowrap"
                                        id="ui-sim-want">想賣幾張？</label>
                                    <input type="number" id="sim-shares" step="0.001" min="0" placeholder="0"
                                        class="w-full bg-white border border-indigo-200 rounded-lg px-3 py-2 sm:py-2.5 text-base focus:ring-2 focus:ring-indigo-400 outline-none font-medium">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs sm:text-sm font-bold text-indigo-800 mb-1"
                                    id="ui-sim-price">如果賣在這個價格：</label>
                                <div class="relative">
                                    <input type="number" id="sim-price" step="0.01"
                                        class="w-full bg-white border border-indigo-200 rounded-lg px-3 py-2 sm:py-2.5 pl-8 text-base sm:text-lg font-bold text-indigo-900 focus:ring-2 focus:ring-indigo-400 outline-none">
                                    <span class="absolute left-3 top-2.5 sm:top-3 text-slate-400 font-bold">$</span>
                                </div>
                            </div>

                            <!-- 試算結果顯示區 -->
                            <div id="sim-result"
                                class="hidden mt-4 pt-4 border-t border-indigo-200 space-y-3 bg-white p-3 sm:p-4 rounded-xl shadow-sm">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs sm:text-sm font-bold text-slate-600"
                                        id="ui-sim-res-fee">扣掉稅費會付：</span>
                                    <span class="text-xs sm:text-sm font-medium text-slate-500"
                                        id="sim-val-fee">$0</span>
                                </div>
                                <div class="flex justify-between items-center bg-green-50 p-2 sm:p-3 rounded-lg">
                                    <span class="text-sm sm:text-base font-bold text-green-800"
                                        id="ui-sim-res-cash">實拿現金：</span>
                                    <span class="text-lg sm:text-xl font-bold text-green-700"
                                        id="sim-val-cash">$0</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xs sm:text-sm font-bold text-slate-600"
                                        id="ui-sim-res-pnl">真正的賺賠：</span>
                                    <span class="text-xl sm:text-2xl font-bold" id="sim-val-pnl">$0</span>
                                </div>
                            </div>
                            <div id="sim-error"
                                class="hidden mt-4 p-3 bg-red-100 text-red-600 text-xs sm:text-sm font-bold rounded-lg text-center">
                            </div>
                        </div>
                    </div>

                    <!-- 新增交易紀錄表單 -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 sm:p-6">
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center text-base sm:text-lg">
                            <i class="fa-solid fa-plus text-red-500 mr-2"></i>
                            <span id="ui-add-title">新增買賣紀錄</span>
                        </h3>
                        <form id="add-tx-form" onsubmit="handleAddTransaction(event)" class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs sm:text-sm font-bold text-slate-600 mb-1"
                                        id="ui-form-action">動作</label>
                                    <select id="form-action"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 sm:py-2.5 text-base focus:ring-2 focus:ring-slate-400 outline-none">
                                        <option value="買">買</option>
                                        <option value="賣">賣</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs sm:text-sm font-bold text-slate-600 mb-1"
                                        id="ui-form-name">名字</label>
                                    <input type="text" id="form-name" required
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 sm:py-2.5 text-base focus:ring-2 focus:ring-slate-400 outline-none">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <!-- 設定 step 為 0.001 支援小數點第三位 -->
                                    <label class="block text-xs sm:text-sm font-bold text-slate-600 mb-1"
                                        id="ui-form-shares">張數</label>
                                    <input type="number" id="form-shares" required step="0.001" min="0.001"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 sm:py-2.5 text-base focus:ring-2 focus:ring-slate-400 outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs sm:text-sm font-bold text-slate-600 mb-1"
                                        id="ui-form-price">單價</label>
                                    <input type="number" id="form-price" required step="0.01" min="0"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 sm:py-2.5 text-base focus:ring-2 focus:ring-slate-400 outline-none">
                                </div>
                            </div>
                            <button type="submit"
                                class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-colors mt-2 text-base"
                                id="ui-form-btn">
                                記錄到帳本
                            </button>
                        </form>
                    </div>

                    <!-- Firebase 雲端同步與備份 -->
                    <div class="bg-slate-900 rounded-2xl shadow-sm p-4 sm:p-6 text-white">
                        <h3 class="font-bold mb-4 flex items-center text-base sm:text-lg">
                            <i class="fa-solid fa-cloud mr-2"></i>
                            <span>雲端同步備份 (Firebase)</span>
                        </h3>
                        <div class="space-y-4">
                            <div id="fb-unauth" class="text-center">
                                <p class="text-xs text-slate-400 mb-3">登入 Google 帳號，即可在手機與電腦間自動同步您的記帳資料。</p>
                                <button onclick="loginWithGoogle()" class="w-full bg-white text-slate-800 hover:bg-slate-100 py-2 rounded-lg text-sm font-bold flex items-center justify-center transition-colors">
                                    <i class="fa-brands fa-google mr-2 text-red-500"></i>使用 Google 登入
                                </button>
                            </div>
                            <div id="fb-auth" class="hidden">
                                <div class="flex items-center justify-between mb-3 bg-slate-800 p-3 rounded-lg">
                                    <div class="flex items-center">
                                        <img id="fb-user-photo" src="" class="w-8 h-8 rounded-full mr-3 border border-slate-600">
                                        <div>
                                            <p id="fb-user-name" class="text-sm font-bold"></p>
                                            <p class="text-[10px] text-emerald-400">● 雲端自動同步中</p>
                                        </div>
                                    </div>
                                    <button onclick="logout()" class="text-xs text-slate-400 hover:text-white underline">登出</button>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="handleCloudUpload(false)" class="bg-indigo-600 hover:bg-indigo-700 py-2 rounded-lg text-sm font-bold flex items-center justify-center">
                                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i>強制上傳
                                    </button>
                                    <button onclick="handleCloudDownload(false)" class="bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm font-bold flex items-center justify-center">
                                        <i class="fa-solid fa-cloud-arrow-down mr-2"></i>強制下載
                                    </button>
                                </div>
                            </div>
                            <p id="sync-status" class="text-xs text-slate-300 text-center font-medium bg-slate-800 py-1 rounded hidden"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript 邏輯區 -->
    <script>
        // --- 核心變數與常數 ---
        const MULTIPLIER = 1000;
        const FEE_DISCOUNT = 0.2;

        let state = {
            lang: 'zh',
            currentPrice: 0,
            transactions: [],
            summary: { pnlData: [], activePersons: [] },
            syncTimer: null
        };

        // --- 資料持久化 ---
        function loadData() {
            const saved = localStorage.getItem('stock_family_data');
            if (saved) {
                state.transactions = JSON.parse(saved);
            } else {
                state.transactions = [
                    { id: 1, date: '2026-04-15', action: '買', person: '洋', shares: 2.000, price: 22.88, amount: 45760 },
                    { id: 2, date: '2026-04-15', action: '買', person: '媽', shares: 8.000, price: 25.52, amount: 204160 }
                ];
            }
            // 讀取同步設定
            document.getElementById('gist-token').value = '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';
            document.getElementById('gist-id').value = '44b988ee23ba3e9d18d4ed4be85cf832';
        }

        function saveData() {
            localStorage.setItem('stock_family_data', JSON.stringify(state.transactions));
            // 匯出摘要供資產總覽讀取
            const shareData = {};
            state.summary.pnlData.forEach(p => {
                shareData[p.person] = {
                    currentVal: p.currentVal,
                    netPnl: p.netPnl,
                    shares: p.shares
                };
            });
            localStorage.setItem('資產', JSON.stringify(shareData));

            // 自動排程上傳 (防抖動)
            clearTimeout(state.syncTimer);
            state.syncTimer = setTimeout(() => {
                handleCloudUpload(true);
            }, 3000);
        }

        // --- 雙語翻譯字典 ---
        const i18n = {
            zh: {
                title: "📈 家庭股票記帳本",
                subtitle: "已自動扣除稅金與手續費 (台股紅漲綠跌)",

                priceLabel: "00631L(正2)市價：",

                whoEarns: "每個人目前賺多少？",
                thName: "名字", thShares: "持有幾張", thAvg: "成本均價", thCost: "投入成本", thVal: "目前價值", thFee: "被扣稅費", thPnl: "實際賺賠", thRoi: "報酬率",
                noShares: "目前沒有持股", unitShares: "張",
                history: "歷史買賣紀錄",
                txDate: "日期", txAction: "動作", txName: "名字", txShares: "張數", txPrice: "成交價", txDel: "刪除",
                buy: "買入", sell: "賣出", actionBuy: "買", actionSell: "賣",
                simTitle: "💡 賣出試算表", simWho: "是誰要賣？", simWant: "想賣幾張？", simPrice: "如果賣在這個價格：",
                simResFee: "這筆交易扣掉稅費會付：", simResCash: "入帳的實拿現金：", simResPnl: "這幾張真正的賺賠：",
                simProfit: "賺", simLoss: "賠", simSelect: "選擇名字", simHas: "還有", simErr1: "輸入錯誤或超過持有量", simErr2: "請選擇",
                addTitle: "新增買賣紀錄", formAction: "動作", formName: "名字 (例如:媽)", formShares: "張數", formPrice: "單價", formBtn: "記錄到帳本"
            },
            vi: {
                title: "📈 Sổ Cổ Phiếu Gia Đình",
                subtitle: "Đã tự động trừ thuế và phí",
                toggleLang: "中文",
                priceLabel: "Giá TT 00631L:",
                totalVal: "Tổng Giá Trị HT", totalPnl: "Tổng Lãi/Lỗ Thuần", totalRoi: "Tỷ Suất LN (ROI)",
                whoEarns: "Mỗi người hiện đang lãi bao nhiêu?",
                thName: "Tên", thShares: "Số lượng (Lô)", thAvg: "Giá bình quân", thCost: "Vốn", thVal: "Giá trị HT", thFee: "Thuế phí", thPnl: "Lãi/Lỗ Thực tế", thRoi: "ROI",
                noShares: "Không có cổ phiếu", unitShares: "lô",
                history: "Lịch sử Mua/Bán",
                txDate: "Ngày", txAction: "Hành động", txName: "Tên", txShares: "Số lượng", txPrice: "Giá", txDel: "Xóa",
                buy: "Mua", sell: "Bán", actionBuy: "Mua", actionSell: "Bán",
                simTitle: "💡 Bảng Tính Thử Bán", simWho: "Ai muốn bán?", simWant: "Muốn bán bao nhiêu lô?", simPrice: "Nếu bán ở giá này:",
                simResFee: "Thuế phí giao dịch:", simResCash: "Tiền mặt thực nhận:", simResPnl: "Lãi/Lỗ thực sự:",
                simProfit: "Lãi", simLoss: "Lỗ", simSelect: "Chọn tên", simHas: "còn", simErr1: "Vượt quá số lượng đang có", simErr2: "Vui lòng chọn",
                addTitle: "Thêm Giao Dịch Mới", formAction: "Hành động", formName: "Tên (VD: Mẹ)", formShares: "Số lượng", formPrice: "Giá", formBtn: "Lưu vào sổ"
            }
        };

        // --- 輔助函數 ---
        const formatMoney = (num) => Math.round(num).toLocaleString('en-US');
        const formatPercent = (num) => (num * 100).toFixed(2) + '%';
        const getPnlColorClass = (val) => val > 0 ? 'text-up' : (val < 0 ? 'text-down' : 'text-slate-500');
        
        // 顯示非侵入式訊息（替代 Alert）
        function showMessage(msg) {
            const el = document.getElementById('sync-status');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        // --- 核心計算引擎 ---
        function computeSummary() {
            let persons = {};
            let totals = { grossCost: 0, netCost: 0, value: 0, netPnl: 0 };

            state.transactions.forEach(tx => {
                if (!persons[tx.person]) persons[tx.person] = { person: tx.person, shares: 0, grossCost: 0, realizedFees: 0 };
                let tradeFee = Math.floor(tx.amount * 0.001425 * FEE_DISCOUNT);

                if (tx.action === '買') {
                    // 使用 parseFloat(..toFixed(3)) 確保運算不會產生 JavaScript 浮點數長尾誤差，強制到小數第三位
                    persons[tx.person].shares = parseFloat((persons[tx.person].shares + tx.shares).toFixed(3));
                    persons[tx.person].grossCost += tx.amount;
                    persons[tx.person].realizedFees += tradeFee;
                } else if (tx.action === '賣') {
                    let avgCost = persons[tx.person].shares > 0 ? persons[tx.person].grossCost / persons[tx.person].shares : 0;
                    persons[tx.person].shares = parseFloat((persons[tx.person].shares - tx.shares).toFixed(3));
                    persons[tx.person].grossCost -= (avgCost * tx.shares);
                }
            });

            let activePersons = Object.values(persons).filter(p => p.shares > 0);
            let pnlData = activePersons.map(p => {
                let currentVal = p.shares * state.currentPrice * MULTIPLIER;
                let estTax = Math.floor(currentVal * 0.003);
                let estFee = Math.floor(currentVal * 0.001425 * FEE_DISCOUNT);

                let netPnl = (currentVal - p.grossCost) - p.realizedFees - estTax - estFee;
                let netCost = p.grossCost + p.realizedFees;

                totals.grossCost += p.grossCost;
                totals.netCost += netCost;
                totals.value += currentVal;
                totals.netPnl += netPnl;

                let roi = netCost !== 0 ? (netPnl / netCost) : 0;

                return { ...p, currentVal, netPnl, netCost, roi, estFees: p.realizedFees + estTax + estFee };
            });

            state.summary = {
                pnlData, activePersons,
                totalValue: totals.value,
                totalNetCost: totals.netCost,
                totalNetPnl: totals.netPnl,
                totalRoi: totals.netCost !== 0 ? (totals.netPnl / totals.netCost) : 0
            };
        }

        // --- 渲染 UI ---
        function render() {
            computeSummary();
            saveData();
            const t = i18n[state.lang];

            // 1. 更新靜態文字翻譯
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('ui-lang-btn-mobile').innerText = t.toggleLang;
            document.getElementById('ui-lang-btn-desktop').innerText = t.toggleLang;
            document.getElementById('ui-price-label').innerText = t.priceLabel;

            document.getElementById('ui-total-val-label').innerText = t.totalVal;
            document.getElementById('ui-total-pnl-label').innerText = t.totalPnl;
            document.getElementById('ui-total-roi-label').innerText = t.totalRoi;

            document.getElementById('ui-who-earns').innerText = t.whoEarns;
            document.getElementById('ui-th-name').innerText = t.thName;
            document.getElementById('ui-th-shares').innerText = t.thShares;
            document.getElementById('ui-th-avg').innerText = t.thAvg;
            document.getElementById('ui-th-cost').innerText = t.thCost;
            document.getElementById('ui-th-val').innerText = t.thVal;
            document.getElementById('ui-th-fee').innerText = t.thFee;
            document.getElementById('ui-th-pnl').innerText = t.thPnl;
            document.getElementById('ui-th-roi').innerText = t.thRoi;

            document.getElementById('ui-history').innerText = t.history;
            document.getElementById('ui-tx-date').innerText = t.txDate;
            document.getElementById('ui-tx-action').innerText = t.txAction;
            document.getElementById('ui-tx-name').innerText = t.txName;
            document.getElementById('ui-tx-shares').innerText = t.txShares;
            document.getElementById('ui-tx-price').innerText = t.txPrice;
            document.getElementById('ui-tx-del').innerText = t.txDel;

            document.getElementById('ui-sim-title').innerText = t.simTitle;
            document.getElementById('ui-sim-who').innerText = t.simWho;
            document.getElementById('ui-sim-want').innerText = t.simWant;
            document.getElementById('ui-sim-price').innerText = t.simPrice;
            document.getElementById('ui-sim-res-fee').innerText = t.simResFee;
            document.getElementById('ui-sim-res-cash').innerText = t.simResCash;
            document.getElementById('ui-sim-res-pnl').innerText = t.simResPnl;

            document.getElementById('ui-add-title').innerText = t.addTitle;
            document.getElementById('ui-form-action').innerText = t.formAction;
            document.getElementById('ui-form-name').innerText = t.formName;
            document.getElementById('ui-form-shares').innerText = t.formShares;
            document.getElementById('ui-form-price').innerText = t.formPrice;
            document.getElementById('ui-form-btn').innerText = t.formBtn;

            document.getElementById('form-action').innerHTML = `
                <option value="買">${t.buy}</option>
                <option value="賣">${t.sell}</option>
            `;

            // 2. 更新 KPI 卡片
            document.getElementById('val-total-value').innerText = '$' + formatMoney(state.summary.totalValue);

            const pnlColor = getPnlColorClass(state.summary.totalNetPnl);
            const pnlSign = state.summary.totalNetPnl > 0 ? '+' : '';
            const pnlIcon = state.summary.totalNetPnl >= 0 ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
            document.getElementById('val-total-pnl').className = `text-2xl sm:text-3xl font-bold flex items-center ${pnlColor}`;
            document.getElementById('val-total-pnl').innerHTML = `<span>${pnlSign}${formatMoney(state.summary.totalNetPnl)}</span> <i class="fa-solid ${pnlIcon} ml-2"></i>`;

            // 卡片背景色
            const cardPnl = document.getElementById('card-total-pnl');
            cardPnl.className = `p-4 sm:p-6 rounded-2xl shadow-sm border ${state.summary.totalNetPnl >= 0 ? 'border-up-light bg-up-light' : 'border-down-light bg-down-light'}`;

            document.getElementById('val-total-roi').innerText = `${pnlSign}${formatPercent(state.summary.totalRoi)}`;
            document.getElementById('val-total-roi').className = `text-2xl sm:text-3xl font-bold ${getPnlColorClass(state.summary.totalRoi)}`;

            // 3. 渲染個人損益表
            const tbodyHoldings = document.getElementById('tbody-holdings');
            if (state.summary.pnlData.length === 0) {
                tbodyHoldings.innerHTML = `<tr><td colSpan="8" class="px-4 py-8 text-center text-slate-400">${t.noShares}</td></tr>`;
            } else {
                tbodyHoldings.innerHTML = state.summary.pnlData.map(row => `
                    <tr class="border-b border-slate-50 hover:bg-slate-50">
                        <td class="px-4 sm:px-6 py-3 sm:py-4 font-bold text-slate-900 sm:text-lg">${row.person}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right font-medium">${row.shares} ${t.unitShares}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right text-slate-500">$${(row.netCost / (row.shares * MULTIPLIER)).toFixed(2)}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right text-slate-600">$${formatMoney(row.netCost)}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right font-bold text-indigo-600">$${formatMoney(row.currentVal)}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right text-slate-400 text-xs sm:text-sm">-$${formatMoney(row.estFees)}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right font-bold sm:text-lg ${getPnlColorClass(row.netPnl)}">
                            ${row.netPnl > 0 ? '+' : ''}${formatMoney(row.netPnl)}
                        </td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right font-bold ${getPnlColorClass(row.roi)}">
                            ${row.roi > 0 ? '+' : ''}${formatPercent(row.roi)}
                        </td>
                    </tr>
                `).join('');
            }

            // 4. 渲染交易紀錄表
            const tbodyTx = document.getElementById('tbody-transactions');
            tbodyTx.innerHTML = state.transactions.map(tx => {
                const actionText = tx.action === '買' ? t.actionBuy : t.actionSell;
                const actionClass = tx.action === '買' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700';
                return `
                    <tr class="border-b border-slate-50 hover:bg-slate-50">
                        <td class="px-4 sm:px-6 py-3 text-slate-600">${tx.date}</td>
                        <td class="px-4 sm:px-6 py-3 text-center">
                            <span class="px-2 py-1 text-xs font-bold rounded-md ${actionClass}">${actionText}</span>
                        </td>
                        <td class="px-4 sm:px-6 py-3 font-bold text-slate-900">${tx.person}</td>
                        <td class="px-4 sm:px-6 py-3 text-right">${tx.shares}</td>
                        <td class="px-4 sm:px-6 py-3 text-right">${tx.price}</td>
                        <td class="px-4 sm:px-6 py-3 text-center">
                            <button onclick="handleDeleteTransaction(${tx.id})" class="p-2 text-slate-300 hover:text-slate-500 rounded-lg">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            // 5. 更新試算表下拉選單 (保留原本選取的值)
            const simSelect = document.getElementById('sim-person');
            const currentSimSelection = simSelect.value;
            simSelect.innerHTML = `<option value="">${t.simSelect}</option>` +
                state.summary.activePersons.map(p => `<option value="${p.person}">${p.person} (${t.simHas} ${p.shares} ${t.unitShares})</option>`).join('');
            if (state.summary.activePersons.some(p => p.person === currentSimSelection)) {
                simSelect.value = currentSimSelection;
            }

            // 重新計算試算表
            calculateSimulation();
        }

        // --- 互動功能 ---
        function toggleLang() {
            state.lang = state.lang === 'zh' ? 'vi' : 'zh';
            render();
        }

        async function fetchStockPrice() {
            const btn = document.getElementById('btn-refresh');
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.querySelector('i').classList.add('fa-spin');

            try {
                const gasUrl = 'https://script.google.com/macros/s/AKfycbzIt-V6AFM7Lxxzg6ekT1ke8xoQKPhOY1R1KuZJ8yXZ4rvGaqPqgukQgMRFoxx0SX5W/exec';
                const targetUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/00631L.TW?interval=1d&range=1d';
                const proxies = [
                    `${gasUrl}?url=${encodeURIComponent(targetUrl)}`,
                    `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                    `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`
                ];

                for (let proxy of proxies) {
                    try {
                        let res = await fetch(proxy);
                        if (!res.ok) continue;
                        let data = await res.json();
                        if (data.contents) data = JSON.parse(data.contents);

                        const result = data?.chart?.result?.[0];
                        if (result) {
                            const price = result.meta.regularMarketPrice || result.meta.chartPreviousClose;
                            if (price) {
                                state.currentPrice = price;
                                document.getElementById('input-current-price').value = price;
                                document.getElementById('sim-price').value = price;
                                break;
                            }
                        }
                    } catch (e) { }
                }
            } catch (error) {
                console.warn("API Error");
            } finally {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.querySelector('i').classList.remove('fa-spin');
                render();
            }
        }

        function handleAddTransaction(e) {
            e.preventDefault();
            const action = document.getElementById('form-action').value;
            const person = document.getElementById('form-name').value;
            // 取到小數點第三位
            const shares = parseFloat(parseFloat(document.getElementById('form-shares').value).toFixed(3));
            const price = parseFloat(document.getElementById('form-price').value);

            if (person && shares && price) {
                state.transactions.push({
                    id: Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    action, person, shares, price,
                    amount: Math.round(shares * price * MULTIPLIER)
                });
                // 清空表單
                document.getElementById('form-shares').value = '';
                document.getElementById('form-price').value = '';
                render();
            }
        }

        function handleDeleteTransaction(id) {
            state.transactions = state.transactions.filter(t => t.id !== id);
            render();
        }

        function calculateSimulation() {
            const t = i18n[state.lang];
            const personName = document.getElementById('sim-person').value;
            const sharesInput = parseFloat(document.getElementById('sim-shares').value);
            const priceInput = parseFloat(document.getElementById('sim-price').value);

            const resultDiv = document.getElementById('sim-result');
            const errorDiv = document.getElementById('sim-error');

            if (!personName || isNaN(sharesInput) || sharesInput <= 0 || isNaN(priceInput)) {
                resultDiv.classList.add('hidden');
                errorDiv.classList.add('hidden');
                return;
            }

            const personData = state.summary.activePersons.find(p => p.person === personName);

            if (!personData || sharesInput > personData.shares) {
                resultDiv.classList.add('hidden');
                errorDiv.innerText = t.simErr1;
                errorDiv.classList.remove('hidden');
                return;
            }

            // 計算試算
            let avgCostPerShare = personData.grossCost / personData.shares;
            let avgFeePerShare = personData.realizedFees / personData.shares;

            let sellValue = Math.round(sharesInput * priceInput * MULTIPLIER);
            let buyCost = Math.round(sharesInput * avgCostPerShare);
            let buyFee = Math.round(sharesInput * avgFeePerShare);

            let sellFee = Math.floor(sellValue * 0.001425 * FEE_DISCOUNT);
            let sellTax = Math.floor(sellValue * 0.003);

            let cashReturn = sellValue - sellFee - sellTax;
            let netPnl = sellValue - buyCost - buyFee - sellFee - sellTax;
            let totalFees = buyFee + sellFee + sellTax;

            // 顯示結果
            document.getElementById('sim-val-fee').innerText = '$' + formatMoney(totalFees);
            document.getElementById('sim-val-cash').innerText = '$' + formatMoney(cashReturn);

            const pnlEl = document.getElementById('sim-val-pnl');
            pnlEl.className = `text-xl sm:text-2xl font-bold ${getPnlColorClass(netPnl)}`;
            pnlEl.innerText = (netPnl > 0 ? `${t.simProfit} $` : `${t.simLoss} $`) + formatMoney(Math.abs(netPnl));

            errorDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
        }

        // --- 監聽輸入框變更 ---
        document.getElementById('input-current-price').addEventListener('input', (e) => {
            state.currentPrice = parseFloat(e.target.value) || 0;
            document.getElementById('sim-price').value = state.currentPrice;
            render();
        });

        ['sim-person', 'sim-shares', 'sim-price'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateSimulation);
        });

        // --- Firebase 雲端同步邏輯 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBSQuMca0U3aoDy-a7m_Rcm6KBv39gRHO8",
            authDomain: "stock-plan-8b37f.firebaseapp.com",
            projectId: "stock-plan-8b37f",
            storageBucket: "stock-plan-8b37f.firebasestorage.app",
            messagingSenderId: "8442333021",
            appId: "1:8442333021:web:ee5e204994c1c520930ab4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let unsubscribeSnapshot = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('fb-unauth').classList.add('hidden');
                document.getElementById('fb-auth').classList.remove('hidden');
                document.getElementById('fb-user-name').innerText = user.displayName || '使用者';
                document.getElementById('fb-user-photo').src = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                
                // 登入後自動下載並開啟即時監聽
                handleCloudDownload();
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                unsubscribeSnapshot = db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists && doc.data().stocks) {
                        // 當雲端更新且不是自己剛剛上傳的，才更新本地
                        state.transactions = doc.data().stocks;
                        render();
                        showMessage('已自動同步最新資料');
                    }
                });
            } else {
                currentUser = null;
                document.getElementById('fb-unauth').classList.remove('hidden');
                document.getElementById('fb-auth').classList.add('hidden');
                if (unsubscribeSnapshot) {
                    unsubscribeSnapshot();
                    unsubscribeSnapshot = null;
                }
            }
        });

        function loginWithGoogle() {
            auth.signInWithPopup(provider).catch(err => {
                console.error(err);
                showMessage('登入失敗');
            });
        }

        function logout() {
            auth.signOut();
            showMessage('已登出');
        }

        async function handleCloudUpload(isAuto = false) {
            if (!currentUser) return;
            if (!isAuto) showMessage('正在同步至雲端...');
            try {
                await db.collection('users').doc(currentUser.uid).set({
                    stocks: state.transactions,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                if (!isAuto) showMessage(`最後同步: ${new Date().toLocaleTimeString()}`);
            } catch (e) {
                console.error(e);
                showMessage('上傳失敗');
            }
        }

        async function handleCloudDownload(isAuto = false) {
            if (!currentUser) return;
            if (!isAuto) showMessage('正在從雲端抓取數據...');
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists && doc.data().stocks) {
                    state.transactions = doc.data().stocks;
                    render();
                    if (!isAuto) showMessage('下載成功！');
                }
            } catch (e) {
                console.error(e);
                showMessage('網路異常');
            }
        }

        // 初始化啟動
        loadData();
        fetchStockPrice();
    </script>
</body>
